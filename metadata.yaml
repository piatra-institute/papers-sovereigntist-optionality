abstract: |-
  When a nationalist party becomes a plausible route to power, the claim that capital is moving to the far right runs a calculation and hides its unit. Capital is a population of firms whose exposure to state discretion and whose freedom to leave differ widely, and those two quantities decide the response. This paper prices the situation as a real option. A firm holds a share of its value in streams the state allocates and a share disciplined by markets, and can move a fraction of itself abroad; a sovereigntist government arrives with some probability, reallocates part of the state-exposed value, and raises the country risk premium. Each firm then takes Hirschman's menu as a menu of options: hedge by buying a call on reallocated rents through access, exit by pulling mobile capital out of a repriced exposure, or voice by lobbying for stability. Solved over 60,000 firms, the model locates a state-dependence threshold near 0.42: below it firms exit, above it they hedge, so the same rising probability that drives mobile capital out drives state-dependent capital toward access. A bond sell-off and a rush for political access in the same week are one repricing seen from two fractions, and the aggregate direction of capital is an artifact of which fractions the economy holds. Across three regimes the access value at stake runs from about 0.13 under consolidated governance to 0.02 where discretion is credibly capped. The sharpest result is negative: a cross-section of firms holding access to a sovereigntist party is generated equally by option-buying and by capture, and the two part only in the response to a change in the probability, where the option unwinds and the capture does not. The same two parameters, rent-discretion and how settled a regime is, place regimes well beyond the European semi-periphery: a regime map puts Norway at the boundary where institutions cap the rents to nothing, the Gulf rentier monarchies at the boundary where the future is already settled and access decays into tribute, and consolidated, party-state, and predatory autocracies in between, with sovereigntist optionality proper the contested interior. The construct prices the wager the word optionality names; it does not certify that any firm has placed it. Ships a runnable simulation whose output carries every modelled number.
